name: Daily Content — Blog + Social

on:
  schedule:
    - cron: '0 12 * * *'  # 8:00 AM ET daily
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run daily content script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TWITTER_CONSUMER_KEY: ${{ secrets.TWITTER_CONSUMER_KEY }}
          TWITTER_CONSUMER_SECRET: ${{ secrets.TWITTER_CONSUMER_SECRET }}
          TWITTER_ACCESS_TOKEN_V1: ${{ secrets.TWITTER_ACCESS_TOKEN_V1 }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: '8570648638'
        run: node scripts/daily-content.mjs
        
      - name: Commit to draft branch + notify Joe for approval
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          RESULT=$(cat /tmp/blog-result.json 2>/dev/null || echo '{}')
          SLUG=$(echo "$RESULT" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).slug||'unknown')")
          TITLE=$(echo "$RESULT" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).title||'unknown')")

          git config user.name "Kenz [hugheyllc]"
          git config user.email "kenz@hugheyllc.com"

          # Push to draft branch, not main
          DRAFT_BRANCH="blog-draft/${SLUG}"
          git checkout -b "$DRAFT_BRANCH"
          git add src/content/blog/ public/images/blog/ SEO_STRATEGY.md || true
          git diff --staged --quiet || git commit -m "draft: ${TITLE}"
          git push origin "$DRAFT_BRANCH" --force

          # Notify Joe via Telegram with topic + URL for approval
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"8570648638\",\"text\":\"\u270f\ufe0f *Blog draft ready*\\n\\n*${TITLE}*\\nhugheyllc.com/blog/${SLUG}/\\n\\nReply \\"publish\\" to go live, or \\"skip\\" to discard.\",\"parse_mode\":\"Markdown\"}"
